name: promote-staging

on:
  push:
    branches:
      - staging

jobs:

  promote:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - user-service
          - order-service
          - payment-service
          - product-service

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: Emmy-github-webdev/Kubernetes-argocd
          token: ${{ secrets.JA_MICS_AP_TOKEN }}
          path: Kubernetes-argocd

      - name: Read Current Dev Image Tag
        id: image
        run: |
          TAG=$(grep newTag \
            Kubernetes-argocd/apps/${{ matrix.service }}/overlays/dev/kustomization.yaml \
            | awk '{print $2}')

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Promotion Branch
        run: |
          BRANCH=staging-${{ matrix.service }}-${{ github.sha }}

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          cd Kubernetes-argocd

          git checkout -b $BRANCH

      - name: Update Staging Overlay
        run: |
          sed -i \
            "s/newTag:.*/newTag: ${{ steps.image.outputs.tag }}/" \
            Kubernetes-argocd/apps/${{ matrix.service }}/overlays/staging/kustomization.yaml

      - name: Commit Changes
        run: |
          cd Kubernetes-argocd

          git config user.name "Emmy-github-webdev"
          git config user.email "ogahemmanuel75@gmail.com"

          git add .

          git diff --cached --quiet || \
          git commit \
            -m "Promote ${{ matrix.service }} to staging"

      - name: Push Branch
        run: |
          cd Kubernetes-argocd

          git push origin $BRANCH

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.JA_MICS_AP_TOKEN }}
        run: |
          cd Kubernetes-argocd

          gh pr create \
            --base staging \
            --head $BRANCH \
            --title "Promote ${{ matrix.service }} to staging" \
            --body "Promoting image tag ${{ steps.image.outputs.tag }} from dev to staging"

  staging-validation:

    needs: promote

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - user-service
          - order-service
          - payment-service
          - product-service

    steps:

      - uses: actions/checkout@v4

      - name: Wait for ArgoCD Deployment
        run: |
          echo "Waiting for staging deployment of ${{ matrix.service }}..."
          sleep 180

      - name: Smoke Tests
        run: |
          ./tests/smoke/run.sh

      - name: API Tests
        run: |
          mvn test -Pstaging-api

      - name: Contract Tests
        run: |
          mvn verify -Pcontract

      - name: End-to-End Tests
        run: |
          npx playwright test

      - name: Performance Tests
        run: |
          k6 run performance/checkout.js

      - name: OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t https://staging.company.com