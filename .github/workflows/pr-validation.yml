name: pr-validation

on:
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:

  owasp-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: OWASP DB cache
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: owasp-${{ runner.os }}-dc12

      - name: Update OWASP DB
        run: |
          mvn org.owasp:dependency-check-maven \
            -Dnvd.api.key=${{ secrets.NVD_API_KEY }} \
            -Ddependency-check.dataDirectory=$HOME/.dependency-check-data \
            -Dnvd.maxRetryCount=20 \
            -Dnvd.delay=30000


  quality-gate:

    needs: owasp-db
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - user-service
          - order-service
          - payment-service
          - product-service

    permissions:
      contents: write
      pull-requests: write
      security-events: write
      id-token: write 
      issues: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Unit Tests
        working-directory: ${{ matrix.service }}
        run: mvn test

      - name: Integration Tests
        working-directory: ${{ matrix.service }}
        run: mvn verify

      - name: Coverage
        working-directory: ${{ matrix.service }}
        run: mvn jacoco:report

      - name: SonarQube
        working-directory: ${{ matrix.service }}
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}_${{ matrix.service }}

      - name: Restore OWASP DB
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: owasp-${{ runner.os }}-dc12

      - name: Dependency Check
        working-directory: ${{ matrix.service }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -Ddependency-check.dataDirectory=$HOME/.dependency-check-data \
            -Ddependency-check.threads=4 \
            -DautoUpdate=false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.JA_MICS_AP_TOKEN }}
        with:
          args: detect --source . --redact --exit-code=2
