name: ecommerce-microservices-ci

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - user-service
          - order-service
          - payment-service
          - product-service

    permissions:
      contents: write
      pull-requests: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Unit Tests
        run: |
          mvn test \
            -pl ${{ matrix.service }} \
            -am

      - name: Integration Tests
        run: |
          mvn verify \
            -pl ${{ matrix.service }} \
            -am

      - name: Build JAR
        run: |
          mvn clean package \
            -pl ${{ matrix.service }} \
            -am

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: eu-central-1

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: |
          docker build \
            -f ${{ matrix.service }}/Dockerfile \
            -t $ECR/${{ matrix.service }}:${{ github.sha }} \
            .

      - name: Push Image
        run: |
          docker push \
            $ECR/${{ matrix.service }}:${{ github.sha }}

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR }}/${{ matrix.service }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Update GitOps Repo
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://github.com/company/gitops-repo.git

          cd gitops-repo

          git checkout -b update-${{ matrix.service }}-${{ github.sha }}

          cd apps/${{ matrix.service }}/overlays/dev

          sed -i "s/newTag:.*/newTag: ${{ github.sha }}/" kustomization.yaml

          git config user.name github-actions
          git config user.email github-actions@company.com

          git add .
          git commit -m "Update ${{ matrix.service }} image"

          git push origin HEAD